<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var menor, meio, maior, a, b, c;
        a = parseFloat(prompt("Digite o valor de 1:"));
        b = parseFloat(prompt("Digite o valor de 2:"));
        c = parseFloat(prompt("Digite o valor de 3:"));

        if (a < b){
            if (a < c){
                menor = a
                if (b < c){
                    meio = b;
                    maior = c;
                }else{
                    meio = c;
                    maior = b;
                }
                 
            }
        }

        if (b < a){
            if (b < c){
                menor = b;
                if (a < c){
                    meio = a;
                    maior = c;
                }else{
                    meio = c;
                    maior = a;
                }
            }
        }

        if (c < a){
            if (c < b){
                menor = c;
                if (a < b){
                    meio = a;
                    maior = b;
                }else{
                    meio = b;
                    maior = a;
                }
            }
        }
        document.write("<br>Menor: " +menor)
        document.write("<br>Menor: " +meio)
        document.write("<br>Menor: " +maior)
    </script>
</body>
</html>

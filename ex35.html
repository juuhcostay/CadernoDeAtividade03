<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var nome = prompt("Digite seu nome:");
        var p1 = parseFloat(prompt("Digite a nota da prova de Portugues:"));
        var p2 = parseFloat(prompt("Digite a nota da prova de matematica:"));
        var p3 = parseFloat(prompt("Digite a nota da prova de Conhecimentos Gerais:"));

        if (p1 >= 7, p2 >= 7, p3 >= 7) {
            document.write(nome + "APROVADO:");

        }else if (p1 <= 7, p2 <= 7, p3 <= 7) {
            document.write(nome +  "Reprovado");  
        }
        
        
    </script>
</body>
</html>

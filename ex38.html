<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a = parseInt(prompt("Digite o valor de a: "));
        var b = parseInt(prompt("Digite o valor de b: "));
        var c = parseInt(prompt("Digite o valor de c: "));


        if (a + b > c) {
            document.write("A soma é maior que c!");

        }else if (a + b < c) {
            document.write("A soma é menor que c!");

        }else {
            document.write("A soma é igual a c!");
        }
    </script>
</body>
</html>if
